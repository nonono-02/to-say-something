<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Say Something ✦</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Pinyon+Script&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Decorative gold page frame -->
    <div class="page-frame"></div>

    <!-- Falling petals layer -->
    <div class="petals-container" id="petalsContainer"></div>

    <!-- Main layout -->
    <div class="page-wrapper">
        <div class="main-card">

            <!-- Crimson ribbon accent at top -->
            <div class="card-ribbon"></div>

            <!-- Gold corner leaf ornaments -->
            <span class="card-corner card-corner-tl">❧</span>
            <span class="card-corner card-corner-tr">❧</span>
            <span class="card-corner card-corner-bl">❧</span>
            <span class="card-corner card-corner-br">❧</span>

            <div class="card-body">

                <!-- Date range placeholder -->
                <p class="card-date">Month DD, YYYY · Month DD, YYYY</p>

                <!-- Main script title -->
                <h1 class="card-title">To Say Something</h1>

                <!-- Italic subtitle in crimson -->
                <p class="card-tagline">Placeholder tagline — a short tender line goes here</p>

                <!-- Gold divider ornament -->
                <div class="divider">
                    <span class="divider-icon">✦</span>
                </div>

                <!-- Short note / intro text -->
                <p class="card-note">
                    This is placeholder text. A sweet, personal note or message
                    will live here once the content is ready. Keep it warm and brief.
                </p>

                <!-- Navigation buttons -->
                <nav class="card-nav">
                    <a href="collage.html" class="nav-btn nav-btn-primary">
                        <span class="nav-btn-icon">✿</span>
                        <span>Our Memories</span>
                    </a>
                    <a href="messages.html" class="nav-btn nav-btn-secondary">
                        <span class="nav-btn-icon">♡</span>
                        <span>Messages</span>
                    </a>
                </nav>

                <!-- Closing signature -->
                <p class="card-signature">Signature Placeholder</p>

            </div><!-- /.card-body -->
        </div><!-- /.main-card -->
    </div><!-- /.page-wrapper -->

    <script src="script.js"></script>
</body>
</html>
