<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Letter · To Say Something</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400&family=Herr+Von+Muellerhoff&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>

    /* ── Stage: full-height centred column ───────────── */
    .envelope-stage {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      padding: 7rem 1.5rem 5rem;
    }

    /* ── Hint ────────────────────────────────────────── */
    #hint {
      font-family: 'Cormorant Garamond', serif;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--gold-dark);
      animation: fade-up .7s .5s both;
      transition: opacity .4s;
    }
    #hint.hide { opacity: 0; pointer-events: none; }

    /* ── Outer wrapper — sets the coordinate space ───── */
    #scene {
      position: relative;
      width: 400px;
      /* height grows to contain letter once opened */
      animation: fade-up .8s .15s both;
      cursor: pointer;
    }

    /* ── Letter paper ────────────────────────────────── */
    #letter {
      position: absolute;
      left: 20px;
      width: 360px;
      background: #fffdf7;
      border: 1px solid rgba(201,168,76,.25);
      border-radius: 3px;
      box-shadow: 0 2px 14px rgba(46,44,42,.12);
      padding: 1.8rem 1.6rem 1.6rem;
      box-sizing: border-box;
      overflow: hidden;
      /* Start: bottom of scene, z below envelope, clipped to 0 height */
      bottom: 0;
      max-height: 0;
      opacity: 0;
      z-index: 2;
      transition: none;
    }

    /* ── Envelope body SVG ───────────────────────────── */
    #env-svg {
      position: relative;
      display: block;
      width: 400px;
      z-index: 3;
      filter: drop-shadow(0 6px 18px rgba(46,44,42,.14));
    }

    /* ── Flap SVG (separate, rotates open) ───────────── */
    #flap-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 400px;
      z-index: 10;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform .7s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }

    /* ── Wax seal ────────────────────────────────────── */
    #seal {
      position: absolute;
      top: calc(50% + 4px);   /* sits on the flap fold line */
      left: 50%;
      transform: translate(-50%, -50%);
      width: 48px;
      height: 48px;
      background: radial-gradient(circle at 38% 36%, #e05555, #c0392b 55%, #7a1515);
      border-radius: 50%;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(192,57,43,.45), inset 0 1px 3px rgba(255,255,255,.2);
      font-size: .9rem;
      color: rgba(255,255,255,.88);
      font-family: 'Herr Von Muellerhoff', cursive;
      line-height: 1;
      transition: opacity .4s, transform .4s;
    }

    /* ── Letter content ──────────────────────────────── */
    .letter-top-rule {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
      border-radius: 2px;
      margin-bottom: 1.1rem;
    }

    #letter-inner {
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .5s, transform .5s;
    }

    .letter-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: .9rem;
    }

    .letter-salutation {
      font-family: 'Herr Von Muellerhoff', cursive;
      font-size: 2rem;
      color: var(--charcoal);
      margin-bottom: .7rem;
      line-height: 1.2;
    }

    .letter-body {
      font-size: 1rem;
      line-height: 1.85;
      color: var(--slate);
      font-style: italic;
      background-image: repeating-linear-gradient(
        transparent, transparent 28px,
        rgba(201,168,76,.1) 28px, rgba(201,168,76,.1) 29px
      );
      background-position: 0 4px;
      padding-bottom: 4px;
    }
    .letter-body p + p { margin-top: .85rem; }

    .letter-closing {
      margin-top: 1.5rem;
      text-align: right;
    }
    .letter-closing p {
      font-family: 'Herr Von Muellerhoff', cursive;
      font-size: 1.75rem;
      color: var(--red);
      line-height: 1.3;
    }
    .letter-closing small {
      display: block;
      font-size: .66rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--ash);
      margin-top: .25rem;
    }

    /* ── Back button ─────────────────────────────────── */
    #back-btn {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .5s, transform .5s;
      pointer-events: none;
    }
    #back-btn.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* ── Idle breathe ────────────────────────────────── */
    @keyframes env-breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.013); }
    }
    #scene.idle #env-svg { animation: env-breathe 3s ease-in-out infinite; }
    #scene.idle:hover #seal { transform: translate(-50%, -50%) scale(1.12); }

    /* responsive */
    @media (max-width: 480px) {
      #scene, #env-svg, #flap-svg { width: 310px; }
      #letter { left: 15px; width: 280px; }
    }
  </style>
</head>
<body>

  <div class="petal-canvas" id="petalCanvas"></div>

  <nav class="site-nav">
    <a href="index.html" class="nav-brand">To Say Something</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="collage.html">Memories</a></li>
      <li><a href="messages.html" class="active">Letters</a></li>
    </ul>
  </nav>

  <div class="page-wrapper">
    <div class="envelope-stage">

      <p id="hint">✦ tap to open ✦</p>

      <!-- ══════════════════════════════════════════════ -->
      <!--  SCENE                                         -->
      <!-- ══════════════════════════════════════════════ -->
      <div id="scene" class="idle" onclick="openEnvelope()">

        <!-- 1. Letter paper — lives BEHIND envelope in z -->
        <div id="letter">
          <div class="letter-top-rule"></div>
          <div id="letter-inner">
            <p class="letter-date">Placeholder date &nbsp;·&nbsp; Placeholder place</p>
            <p class="letter-salutation">Dear [Name],</p>
            <div class="letter-body">
              <p>This is a placeholder for the main letter..</p>
            </div>
            <div class="letter-closing">
              <p>always yours,<br>[ your name ]</p>
            </div>
          </div>
        </div>

        <!-- 2. Envelope body (SVG, drawn over the letter) -->
        <svg id="env-svg" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
          <!-- Main body rectangle -->
          <rect x="0" y="0" width="400" height="250" rx="4" fill="url(#envGrad)" stroke="rgba(201,168,76,0.45)" stroke-width="1"/>
          <!-- Left interior fold -->
          <polygon points="0,0 0,250 200,145" fill="rgba(220,204,166,0.75)"/>
          <!-- Right interior fold -->
          <polygon points="400,0 400,250 200,145" fill="rgba(205,188,148,0.70)"/>
          <!-- Bottom point fold -->
          <polygon points="0,250 400,250 200,145" fill="rgba(230,215,178,0.85)"/>
          <!-- Seam lines -->
          <line x1="0" y1="0" x2="200" y2="145" stroke="rgba(201,168,76,0.22)" stroke-width="1"/>
          <line x1="400" y1="0" x2="200" y2="145" stroke="rgba(201,168,76,0.22)" stroke-width="1"/>
          <defs>
            <linearGradient id="envGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#fdf6e3"/>
              <stop offset="100%" stop-color="#f0e2c0"/>
            </linearGradient>
          </defs>
        </svg>

        <!-- 3. Flap (separate SVG, rotates open around top edge) -->
        <svg id="flap-svg" viewBox="0 0 400 145" xmlns="http://www.w3.org/2000/svg">
          <!-- Flap triangle (points downward — V shape from top corners to centre bottom) -->
          <polygon points="0,0 400,0 200,145" fill="url(#flapGrad)" stroke="rgba(201,168,76,0.4)" stroke-width="1" stroke-linejoin="round"/>
          <!-- Subtle crease line at fold -->
          <line x1="0" y1="0" x2="400" y2="0" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
          <defs>
            <linearGradient id="flapGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fdf6e3"/>
              <stop offset="100%" stop-color="#ecddb8"/>
            </linearGradient>
          </defs>
        </svg>

        <!-- 4. Wax seal centred on the flap fold line -->
        <div id="seal">✦</div>

      </div>
      <!-- /scene -->

      <!-- Back button — outside scene, shown by JS -->
      <div id="back-btn">
        <a href="index.html" class="btn btn-outline">← Back to Home</a>
      </div>

    </div>
  </div>

  <script>
    let hasOpened = false;

    function openEnvelope() {
      if (hasOpened) return;
      hasOpened = true;

      const scene  = document.getElementById('scene');
      const hint   = document.getElementById('hint');
      const flap   = document.getElementById('flap-svg');
      const seal   = document.getElementById('seal');
      const letter = document.getElementById('letter');
      const inner  = document.getElementById('letter-inner');
      const back   = document.getElementById('back-btn');

      scene.classList.remove('idle');
      scene.onclick = null;
      scene.style.cursor = 'default';
      hint.classList.add('hide');

      /* ── Step 1 (0ms): flap opens + seal fades ─── */
      flap.style.transition = 'transform .7s cubic-bezier(.4,0,.2,1)';
      flap.style.transform  = 'rotateX(180deg)';
      seal.style.opacity    = '0';
      seal.style.transform  = 'translate(-50%, -50%) scale(.5)';

      /* ── Step 2 (550ms): letter becomes visible and rises ── */
      setTimeout(() => {
        /* Reveal letter at current position (inside env), no animation yet */
        letter.style.transition = 'none';
        letter.style.maxHeight  = '600px';
        letter.style.opacity    = '1';

        /* Force reflow so the browser registers the height before animating */
        letter.getBoundingClientRect();

        /* Now animate the rise */
        letter.style.transition = 'transform .65s cubic-bezier(.22,.84,.36,1), bottom .65s cubic-bezier(.22,.84,.36,1)';
        letter.style.bottom     = '220px';
      }, 550);

      /* ── Step 3 (1200ms): letter expands to full height ─── */
      setTimeout(() => {
        letter.style.transition = 'max-height .55s cubic-bezier(.4,0,.2,1), transform .65s, bottom .65s';
        /* max-height already 600px, no change needed — content just becomes readable */

        /* Fade in the letter content */
        inner.style.opacity   = '1';
        inner.style.transform = 'translateY(0)';
      }, 1200);

      /* ── Step 4 (2000ms): show back button ─────────────── */
      setTimeout(() => {
        back.classList.add('show');
      }, 2000);
    }

    /* ── Petals ─────────────────────────────────────────── */
    (function () {
      const canvas  = document.getElementById('petalCanvas');
      const symbols = ['✿', '❀', '·', '♡', '✦'];
      const colors  = ['#c9a84c', '#c0392b', '#b0aba4', '#e8cd87'];
      function spawn() {
        const el = document.createElement('span');
        el.className = 'petal';
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = Math.random() * 96 + '%';
        el.style.fontSize = (12 + Math.random() * 12) + 'px';
        el.style.color = colors[Math.floor(Math.random() * colors.length)];
        const dur = 14 + Math.random() * 10;
        el.style.setProperty('--drift', ((Math.random() - .5) * 100) + 'px');
        el.style.setProperty('--spin', (Math.random() * 360) + 'deg');
        el.style.animationDuration = dur + 's';
        canvas.appendChild(el);
        setTimeout(() => { if (el.parentNode) canvas.removeChild(el); }, dur * 1000);
      }
      for (let i = 0; i < 10; i++) setTimeout(spawn, i * 900);
      setInterval(spawn, 2800);
    })();
  </script>

</body>
</html>
